name: RTU 전력 예측 파이프라인

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30  
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/375892690162/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-actions-sa@rtu-power-mlops-500306.iam.gserviceaccount.com

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 파이프라인 실행
        run: python -m src.pipeline

      - name: 결과 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: |
            output/submission.csv
            output/anomaly_result.csv